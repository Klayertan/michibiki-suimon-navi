<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Michibiki Pond Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQmbM3HlkR7n2ATyMZ5OnBfS1SR1B0=" crossorigin="">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --text: #1d2528;
      --muted: #647174;
      --line: #d9dfdc;
      --green: #15803d;
      --orange: #d97706;
      --active: #2563eb;
      --abandoned: #7c2d12;
      --drained: #6b7280;
      --unknown: #334155;
      --shadow: 0 10px 30px rgba(29, 37, 40, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 14px clamp(14px, 3vw, 28px);
      position: relative;
      z-index: 500;
    }

    .top-row {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      justify-content: space-between;
    }

    h1 {
      font-size: 1.25rem;
      line-height: 1.2;
      margin: 0;
    }

    .controls {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
    }

    .action-button {
      align-items: center;
      background: #214e57;
      border: 0;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font-size: 0.95rem;
      font-weight: 700;
      gap: 8px;
      justify-content: center;
      min-height: 42px;
      padding: 10px 14px;
      text-decoration: none;
    }

    .action-button.secondary {
      background: #455a64;
    }

    .action-button.phone {
      background: #b91c1c;
    }

    .action-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .action-button:focus,
    .action-button:focus-within {
      outline: 3px solid rgba(33, 78, 87, 0.28);
      outline-offset: 2px;
    }

    .action-button input {
      height: 1px;
      opacity: 0;
      position: absolute;
      width: 1px;
    }

    .filter {
      align-items: center;
      color: var(--text);
      display: inline-flex;
      font-size: 0.95rem;
      gap: 8px;
      min-height: 42px;
      white-space: nowrap;
    }

    .filter input {
      accent-color: var(--green);
      height: 18px;
      width: 18px;
    }

    .summary {
      align-items: center;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      font-size: 0.93rem;
      gap: 8px 16px;
      margin-top: 12px;
    }

    .summary strong {
      color: var(--text);
      font-weight: 750;
    }

    .summary-item {
      align-items: center;
      display: inline-flex;
      gap: 6px;
    }

    .gps-message {
      color: #b91c1c;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .dot {
      border-radius: 50%;
      display: inline-block;
      height: 10px;
      width: 10px;
    }

    .dot.green {
      background: var(--green);
    }

    .dot.orange {
      background: var(--orange);
    }

    main {
      min-height: 0;
      position: relative;
    }

    #map {
      height: 100%;
      min-height: 520px;
      width: 100%;
    }

    .empty-state {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      color: var(--muted);
      left: 50%;
      max-width: min(420px, calc(100vw - 28px));
      padding: 16px 18px;
      position: absolute;
      text-align: center;
      top: 28px;
      transform: translateX(-50%);
      z-index: 450;
    }

    .empty-state strong {
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }

    .leaflet-popup-content {
      line-height: 1.45;
      margin: 12px 14px;
    }

    .popup-panel {
      min-width: min(280px, calc(100vw - 72px));
    }

    .popup-grid {
      display: grid;
      gap: 4px 12px;
      grid-template-columns: auto 1fr;
      margin-bottom: 12px;
    }

    .popup-grid span:nth-child(odd) {
      color: var(--muted);
    }

    .quality-band {
      align-items: center;
      display: inline-flex;
      gap: 5px;
    }

    .quality-band::before {
      border-radius: 50%;
      content: "";
      display: inline-block;
      height: 8px;
      width: 8px;
    }

    .quality-band.good {
      color: #15803d;
    }

    .quality-band.good::before {
      background: #15803d;
    }

    .quality-band.normal {
      color: #647174;
    }

    .quality-band.normal::before {
      background: #94a3b8;
    }

    .quality-band.warning {
      color: #c2410c;
    }

    .quality-band.warning::before {
      background: #f97316;
    }

    .quality-band.poor {
      color: #b91c1c;
    }

    .quality-band.poor::before {
      background: #dc2626;
    }

    .survey-form {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
      padding-top: 12px;
    }

    .survey-field {
      display: grid;
      gap: 4px;
    }

    .survey-field label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .survey-field input,
    .survey-field select,
    .survey-field textarea {
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      padding: 8px 9px;
      width: 100%;
    }

    .survey-field textarea {
      min-height: 74px;
      resize: vertical;
    }

    .survey-save {
      background: #214e57;
      border: 0;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      min-height: 40px;
      padding: 9px 12px;
    }

    @media (max-width: 760px) {
      .top-row {
        align-items: stretch;
      }

      .controls {
        align-items: stretch;
        flex-direction: column;
        width: 100%;
      }

      .action-button,
      .filter {
        justify-content: center;
        width: 100%;
      }

      #map {
        min-height: 62vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="top-row">
        <h1>Michibiki Pond Map</h1>
        <div class="controls">
          <label class="action-button">
            Upload .nmea file
            <input id="fileInput" type="file" accept=".nmea,text/plain">
          </label>
          <label class="action-button secondary">
            Import survey JSON
            <input id="importInput" type="file" accept=".json,application/json">
          </label>
          <button id="exportButton" class="action-button secondary" type="button" disabled>Export survey JSON</button>
          <button id="recordPhoneButton" class="action-button phone" type="button">📍 Record phone GPS point</button>
          <button id="clearPhoneButton" class="action-button secondary" type="button" disabled>Clear phone GPS points</button>
          <label class="filter">
            <input id="showQz1Layer" type="checkbox" checked>
            QZ1 layer
          </label>
          <label class="filter">
            <input id="showPhoneLayer" type="checkbox" checked>
            Phone GPS layer
          </label>
          <label class="filter">
            <input id="augmentedOnly" type="checkbox">
            Show only augmented points
          </label>
        </div>
      </div>
      <div id="summary" class="summary" aria-live="polite" hidden>
        <span class="summary-item">Total points: <strong id="totalPoints">0</strong></span>
        <span class="summary-item"><span class="dot green"></span>Augmented: <strong id="augmentedPoints">0</strong></span>
        <span class="summary-item"><span class="dot orange"></span>Plain GPS: <strong id="gpsPoints">0</strong></span>
        <span class="summary-item">Skipped lines: <strong id="skippedLines">0</strong></span>
        <span class="summary-item">Status: <strong id="statusCounts">0 unknown</strong></span>
        <span id="comparisonSummary" class="summary-item" hidden>Comparison: <strong id="comparisonText"></strong></span>
      </div>
      <div id="gpsMessage" class="gps-message" role="status" aria-live="polite" hidden></div>
    </header>

    <main>
      <div id="map"></div>
      <div id="emptyState" class="empty-state">
        <strong>No NMEA file loaded</strong>
        Upload a field capture or import survey JSON to plot valid GGA positions.
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const STATUS_OPTIONS = ["active", "abandoned", "drained", "unknown"];
    const STATUS_COLORS = {
      active: "#2563eb",
      abandoned: "#7c2d12",
      drained: "#6b7280",
      unknown: "#334155"
    };

    const map = L.map("map", { zoomControl: true }).setView([34.65, 135.83], 14);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    const fileInput = document.getElementById("fileInput");
    const importInput = document.getElementById("importInput");
    const exportButton = document.getElementById("exportButton");
    const recordPhoneButton = document.getElementById("recordPhoneButton");
    const clearPhoneButton = document.getElementById("clearPhoneButton");
    const showQz1LayerInput = document.getElementById("showQz1Layer");
    const showPhoneLayerInput = document.getElementById("showPhoneLayer");
    const augmentedOnlyInput = document.getElementById("augmentedOnly");
    const emptyState = document.getElementById("emptyState");
    const gpsMessage = document.getElementById("gpsMessage");
    const comparisonSummary = document.getElementById("comparisonSummary");
    const comparisonText = document.getElementById("comparisonText");
    const summary = document.getElementById("summary");
    const summaryEls = {
      total: document.getElementById("totalPoints"),
      augmented: document.getElementById("augmentedPoints"),
      gps: document.getElementById("gpsPoints"),
      skipped: document.getElementById("skippedLines"),
      status: document.getElementById("statusCounts")
    };

    let parsedPoints = [];
    let phonePoints = [];
    let pointLayer = L.layerGroup().addTo(map);
    let phoneLayer = L.layerGroup().addTo(map);
    let lastSkippedCount = 0;

    function parseNmea(text) {
      const result = {
        points: [],
        malformed: 0,
        noFix: 0,
        ignored: 0
      };

      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();
        if (!line) {
          return;
        }

        if (!/^\$G[A-Z0-9]GGA,/i.test(line)) {
          result.ignored += 1;
          return;
        }

        const sentence = line.split("*")[0];
        const fields = sentence.split(",");
        if (fields.length < 10) {
          result.malformed += 1;
          return;
        }

        const fixQuality = Number.parseInt(fields[6], 10);
        if (!Number.isFinite(fixQuality)) {
          result.malformed += 1;
          return;
        }

        if (fixQuality === 0) {
          result.noFix += 1;
          return;
        }

        const lat = parseCoordinate(fields[2], fields[3], 2);
        const lon = parseCoordinate(fields[4], fields[5], 3);
        const satellites = Number.parseInt(fields[7], 10);
        const hdop = Number.parseFloat(fields[8]);
        const altitude = Number.parseFloat(fields[9]);

        if (
          lat === null ||
          lon === null ||
          !Number.isFinite(satellites) ||
          !Number.isFinite(hdop) ||
          !Number.isFinite(altitude)
        ) {
          result.malformed += 1;
          return;
        }

        if (fixQuality === 1 || fixQuality === 2 || fixQuality === 4 || fixQuality === 5) {
          result.points.push(createPoint({
            id: `nmea-${result.points.length}`,
            timestamp: fields[1],
            lat,
            lon,
            fixQuality,
            satellites,
            hdop,
            altitude
          }));
          return;
        }

        result.malformed += 1;
      });

      return result;
    }

    function createPoint(point) {
      const fixQuality = Number.parseInt(point.fixQuality, 10);
      return {
        id: point.id,
        timestamp: String(point.timestamp ?? ""),
        lat: Number(point.lat),
        lon: Number(point.lon),
        fixQuality,
        satellites: Number.parseInt(point.satellites, 10),
        hdop: point.hdop === undefined || point.hdop === null ? null : Number(point.hdop),
        altitude: point.altitude === undefined || point.altitude === null ? null : Number(point.altitude),
        augmented: fixQuality === 2 || fixQuality === 4 || fixQuality === 5,
        status: normalizeStatus(point.status),
        photoRef: String(point.photoRef ?? ""),
        note: String(point.note ?? "")
      };
    }

    function normalizeStatus(status) {
      return STATUS_OPTIONS.includes(status) ? status : "unknown";
    }

    function parseCoordinate(value, hemisphere, degreeDigits) {
      if (!value || !hemisphere || value.length <= degreeDigits) {
        return null;
      }

      const degrees = Number.parseInt(value.slice(0, degreeDigits), 10);
      const minutes = Number.parseFloat(value.slice(degreeDigits));
      if (!Number.isFinite(degrees) || !Number.isFinite(minutes)) {
        return null;
      }

      const upperHemisphere = hemisphere.toUpperCase();
      if (!["N", "S", "E", "W"].includes(upperHemisphere)) {
        return null;
      }

      const sign = upperHemisphere === "S" || upperHemisphere === "W" ? -1 : 1;
      return sign * (degrees + minutes / 60);
    }

    function renderPoints(options = {}) {
      pointLayer.clearLayers();

      const visiblePoints = augmentedOnlyInput.checked
        ? parsedPoints.filter((point) => point.augmented)
        : parsedPoints;

      visiblePoints.forEach((point) => {
        L.circleMarker([point.lat, point.lon], markerStyle(point))
          .bindPopup(buildPopup(point), { maxWidth: 360 })
          .addTo(pointLayer);
      });

      if (visiblePoints.length > 0 && options.fit !== false) {
        const bounds = L.latLngBounds(visiblePoints.map((point) => [point.lat, point.lon]));
        map.fitBounds(bounds, { padding: [36, 36], maxZoom: 18 });
      }

      emptyState.hidden = parsedPoints.length > 0 || phonePoints.length > 0;
      exportButton.disabled = parsedPoints.length === 0;
      syncLayerVisibility();
      updateComparisonSummary();
    }

    function markerStyle(point) {
      const fillColor = point.augmented ? "#15803d" : "#d97706";
      return {
        radius: 8,
        color: STATUS_COLORS[point.status],
        fillColor,
        fillOpacity: 0.84,
        opacity: 1,
        weight: point.status === "unknown" ? 3 : 5
      };
    }

    function renderPhonePoints(options = {}) {
      phoneLayer.clearLayers();

      phonePoints.forEach((point) => {
        L.circle([point.lat, point.lon], {
          radius: point.accuracy,
          color: "#dc2626",
          fillColor: "#dc2626",
          fillOpacity: 0.08,
          opacity: 0.28,
          weight: 1
        }).addTo(phoneLayer);

        L.circleMarker([point.lat, point.lon], {
          radius: 7,
          color: "#7f1d1d",
          fillColor: "#dc2626",
          fillOpacity: 0.9,
          opacity: 1,
          weight: 2
        })
          .bindPopup(buildPhonePopup(point), { maxWidth: 280 })
          .addTo(phoneLayer);
      });

      clearPhoneButton.disabled = phonePoints.length === 0;
      emptyState.hidden = parsedPoints.length > 0 || phonePoints.length > 0;
      syncLayerVisibility();
      updateComparisonSummary();

      if (phonePoints.length > 0 && options.fit !== false) {
        fitVisibleLayers();
      }
    }

    function buildPhonePopup(point) {
      return `
        <div class="popup-panel">
          <div class="popup-grid">
            <span>Phone lat</span><strong>${point.lat.toFixed(6)}</strong>
            <span>Phone lon</span><strong>${point.lon.toFixed(6)}</strong>
            <span>Accuracy radius</span><strong>${formatMeters(point.accuracy)}</strong>
          </div>
        </div>
      `;
    }

    function recordPhoneGpsPoint() {
      clearGpsMessage();

      if (!globalThis.navigator || !navigator.geolocation) {
        showGpsMessage("Phone GPS unavailable — needs HTTPS or localhost, and location permission.");
        return;
      }

      // Browser geolocation requires HTTPS/localhost and meaningful results require a real-GPS device, such as a phone.
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = Number(position.coords.latitude);
          const lon = Number(position.coords.longitude);
          const accuracy = Number(position.coords.accuracy);
          if (!Number.isFinite(lat) || !Number.isFinite(lon) || !Number.isFinite(accuracy)) {
            showGpsMessage("Phone GPS unavailable — needs HTTPS or localhost, and location permission.");
            return;
          }

          phonePoints.push({
            lat,
            lon,
            accuracy,
            timestamp: position.timestamp || Date.now()
          });
          renderPhonePoints();
        },
        () => {
          showGpsMessage("Phone GPS unavailable — needs HTTPS or localhost, and location permission.");
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function clearPhoneGpsPoints() {
      phonePoints = [];
      renderPhonePoints({ fit: false });
      clearGpsMessage();
    }

    function syncLayerVisibility() {
      setLayerVisible(pointLayer, showQz1LayerInput.checked);
      setLayerVisible(phoneLayer, showPhoneLayerInput.checked);
    }

    function setLayerVisible(layer, visible) {
      if (visible && !map.hasLayer(layer)) {
        layer.addTo(map);
      }

      if (!visible && map.hasLayer(layer)) {
        map.removeLayer(layer);
      }
    }

    function fitVisibleLayers() {
      const latLngs = [];

      if (showQz1LayerInput.checked) {
        const qz1Points = augmentedOnlyInput.checked
          ? parsedPoints.filter((point) => point.augmented)
          : parsedPoints;
        qz1Points.forEach((point) => latLngs.push([point.lat, point.lon]));
      }

      if (showPhoneLayerInput.checked) {
        phonePoints.forEach((point) => latLngs.push([point.lat, point.lon]));
      }

      if (latLngs.length > 0) {
        map.fitBounds(L.latLngBounds(latLngs), { padding: [36, 36], maxZoom: 18 });
      }
    }

    function showGpsMessage(message) {
      gpsMessage.textContent = message;
      gpsMessage.hidden = false;
    }

    function clearGpsMessage() {
      gpsMessage.textContent = "";
      gpsMessage.hidden = true;
    }

    function updateComparisonSummary() {
      if (parsedPoints.length === 0 || phonePoints.length === 0) {
        comparisonSummary.hidden = true;
        comparisonText.textContent = "";
        return;
      }

      const phoneAverage = phonePoints.reduce((sum, point) => sum + point.accuracy, 0) / phonePoints.length;
      const qz1Spread = qz1TypicalSpread(parsedPoints);
      comparisonText.textContent = `phone avg accuracy ${formatMeters(phoneAverage)} vs QZ1 spread ${formatMeters(qz1Spread)}`;
      comparisonSummary.hidden = false;
    }

    function qz1TypicalSpread(points) {
      if (points.length < 2) {
        return 0;
      }

      const centroid = points.reduce((center, point) => ({
        lat: center.lat + point.lat / points.length,
        lon: center.lon + point.lon / points.length
      }), { lat: 0, lon: 0 });
      const meanSquared = points.reduce((sum, point) => {
        const distance = distanceMeters(point.lat, point.lon, centroid.lat, centroid.lon);
        return sum + distance * distance;
      }, 0) / points.length;

      return Math.sqrt(meanSquared);
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const earthRadiusMeters = 6371000;
      const toRadians = (degrees) => degrees * Math.PI / 180;
      const dLat = toRadians(lat2 - lat1);
      const dLon = toRadians(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * earthRadiusMeters * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatMeters(value) {
      if (!Number.isFinite(value)) {
        return "N/A";
      }

      return `${value.toFixed(value >= 10 ? 0 : 1)} m`;
    }

    function buildPopup(point) {
      const label = point.augmented ? "SLAS augmented" : "GPS only";
      const hdop = point.hdop === null || !Number.isFinite(point.hdop) ? "N/A" : point.hdop;
      const satelliteBand = satelliteCountBand(point.satellites);
      const hdopBand = hdopQualityBand(point.hdop);
      const statusOptions = STATUS_OPTIONS.map((status) => {
        const selected = status === point.status ? " selected" : "";
        return `<option value="${status}"${selected}>${status}</option>`;
      }).join("");

      return `
        <div class="popup-panel">
          <div class="popup-grid">
            <span>Timestamp</span><strong>${escapeHtml(point.timestamp)}</strong>
            <span>Latitude</span><strong>${point.lat.toFixed(6)}</strong>
            <span>Longitude</span><strong>${point.lon.toFixed(6)}</strong>
            <span>Fix quality</span><strong>${point.fixQuality} (${label})</strong>
            <span>衛星数:</span><strong>${point.satellites} (${qualityBandMarkup(satelliteBand)})</strong>
            <span>HDOP:</span><strong>${escapeHtml(hdop)} (${qualityBandMarkup(hdopBand)})</strong>
          </div>
          <form class="survey-form" data-point-id="${escapeHtml(point.id)}">
            <div class="survey-field">
              <label for="status-${escapeHtml(point.id)}">Status</label>
              <select id="status-${escapeHtml(point.id)}" name="status">${statusOptions}</select>
            </div>
            <div class="survey-field">
              <label for="photo-${escapeHtml(point.id)}">Photo reference</label>
              <input id="photo-${escapeHtml(point.id)}" name="photoRef" type="text" value="${escapeHtml(point.photoRef)}" placeholder="IMG_6685.jpg">
            </div>
            <div class="survey-field">
              <label for="note-${escapeHtml(point.id)}">Note</label>
              <textarea id="note-${escapeHtml(point.id)}" name="note">${escapeHtml(point.note)}</textarea>
            </div>
            <button class="survey-save" type="submit">Save tag</button>
          </form>
        </div>
      `;
    }

    function satelliteCountBand(count) {
      if (count >= 9) {
        return { label: "良い", tone: "good" };
      }

      if (count >= 6) {
        return { label: "普通", tone: "normal" };
      }

      return { label: "限界", tone: "warning" };
    }

    function hdopQualityBand(hdop) {
      if (!Number.isFinite(hdop)) {
        return { label: "不明", tone: "normal" };
      }

      if (hdop < 1) {
        return { label: "非常に良い", tone: "good" };
      }

      if (hdop <= 2) {
        return { label: "良い", tone: "good" };
      }

      if (hdop < 5) {
        return { label: "普通", tone: "normal" };
      }

      return { label: "悪い", tone: "poor" };
    }

    function qualityBandMarkup(band) {
      return `<span class="quality-band ${band.tone}">${escapeHtml(band.label)}</span>`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function updateSummary() {
      const augmented = parsedPoints.filter((point) => point.augmented).length;
      const gps = parsedPoints.filter((point) => !point.augmented).length;
      const statusCounts = countStatuses(parsedPoints);
      summaryEls.total.textContent = String(parsedPoints.length);
      summaryEls.augmented.textContent = String(augmented);
      summaryEls.gps.textContent = String(gps);
      summaryEls.skipped.textContent = String(lastSkippedCount);
      summaryEls.status.textContent = formatStatusCounts(statusCounts);
      summary.hidden = false;
    }

    function countStatuses(points) {
      return points.reduce((counts, point) => {
        counts[point.status] += 1;
        return counts;
      }, { active: 0, abandoned: 0, drained: 0, unknown: 0 });
    }

    function formatStatusCounts(counts) {
      const nonZero = STATUS_OPTIONS
        .filter((status) => counts[status] > 0)
        .map((status) => `${counts[status]} ${status}`);

      return nonZero.length > 0 ? nonZero.join(", ") : "0 unknown";
    }

    function exportSurveyJson() {
      if (parsedPoints.length === 0) {
        return;
      }

      const records = parsedPoints.map((point) => ({
        lat: point.lat,
        lon: point.lon,
        fixQuality: point.fixQuality,
        satelliteCount: point.satellites,
        hdop: point.hdop,
        timestamp: point.timestamp,
        status: point.status,
        photoRef: point.photoRef,
        note: point.note
      }));
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `michibiki-survey-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function parseSurveyJson(text) {
      const data = JSON.parse(text);
      const records = Array.isArray(data) ? data : data.points;
      if (!Array.isArray(records)) {
        throw new Error("Survey JSON must be an array of point records.");
      }

      return records.map((record, index) => {
        const point = createPoint({
          id: `json-${index}`,
          timestamp: record.timestamp,
          lat: record.lat,
          lon: record.lon,
          fixQuality: record.fixQuality,
          satellites: record.satelliteCount,
          hdop: record.hdop,
          status: record.status,
          photoRef: record.photoRef,
          note: record.note
        });

        if (
          !Number.isFinite(point.lat) ||
          !Number.isFinite(point.lon) ||
          !Number.isFinite(point.fixQuality) ||
          !Number.isFinite(point.satellites) ||
          !(point.fixQuality === 1 || point.fixQuality === 2 || point.fixQuality === 4 || point.fixQuality === 5)
        ) {
          throw new Error(`Invalid point record at index ${index}.`);
        }

        return point;
      });
    }

    function saveSurveyForm(form) {
      const point = parsedPoints.find((candidate) => candidate.id === form.dataset.pointId);
      if (!point) {
        return;
      }

      const formData = new FormData(form);
      point.status = normalizeStatus(formData.get("status"));
      point.photoRef = String(formData.get("photoRef") || "").trim();
      point.note = String(formData.get("note") || "").trim();
      updateSummary();
      renderPoints({ fit: false });
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) {
        return;
      }

      const text = await file.text();
      const parseResult = parseNmea(text);
      parsedPoints = parseResult.points;
      lastSkippedCount = parseResult.noFix + parseResult.malformed;
      updateSummary();
      renderPoints();
      fileInput.value = "";
    });

    importInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) {
        return;
      }

      try {
        parsedPoints = parseSurveyJson(await file.text());
        lastSkippedCount = 0;
        updateSummary();
        renderPoints();
      } catch (error) {
        alert(error.message);
      } finally {
        importInput.value = "";
      }
    });

    exportButton.addEventListener("click", exportSurveyJson);
    recordPhoneButton.addEventListener("click", recordPhoneGpsPoint);
    clearPhoneButton.addEventListener("click", clearPhoneGpsPoints);
    showQz1LayerInput.addEventListener("change", syncLayerVisibility);
    showPhoneLayerInput.addEventListener("change", syncLayerVisibility);
    augmentedOnlyInput.addEventListener("change", () => renderPoints());

    document.addEventListener("submit", (event) => {
      if (!event.target.matches(".survey-form")) {
        return;
      }

      event.preventDefault();
      saveSurveyForm(event.target);
    });
  </script>
</body>
</html>
